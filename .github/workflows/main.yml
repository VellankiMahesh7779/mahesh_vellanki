name: C++ Compile Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile all C++ files
        run: |
          # Find all .cpp files in the repo
          CPP_FILES=$(find . -type f -name "*.cpp")

          if [ -z "$CPP_FILES" ]; then
            echo "No C++ files found. Exiting."
            exit 0
          fi

          # Compile all files together
          g++ -std=c++17 $CPP_FILES -o app
