name: C++ Build and Run

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build and Run (functions folder)
        run: |
          cd Allcppprograms/functions
          if ls *.cpp 1> /dev/null 2>&1; then
            g++ -std=c++17 *.cpp -o app
            ./app
          fi

      - name: Build and Run (practiceprograms folder)
        run: |
          cd Allcppprograms/practiceprograms
          if ls *.cpp 1> /dev/null 2>&1; then
            g++ -std=c++17 *.cpp -o app
            ./app
          fi
