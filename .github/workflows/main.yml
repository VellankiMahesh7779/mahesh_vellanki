name: Build and Run C++, Java, and Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y g++ openjdk-21-jre-headless python3 python3-pip

      - name: Setup Python (if requirements.txt)
        run: |
          [ -f requirements.txt ] && pip3 install -r requirements.txt || echo "No Python deps."

      - name: Run C++ programs
        run: |
          set -e
          echo "▶ C++ files check..."
          cpp_files=$(find . -name "*.cpp" -not -path "./.git/*") || true
          [ -z "$cpp_files" ] && echo "No C++ files." && exit 0
          mkdir -p build/cpp
          for f in $cpp_files; do
            out="build/cpp/$(basename "$f" .cpp)"
            echo "⚙️ Compiling $f"
            g++ -std=c++17 "$f" -o "$out"
            echo "🚀 Running $out"
            "$out"
          done

      - name: Run Java programs (auto add missing packages)
        run: |
          set -e
          echo "▶ Java files check..."
          java_files=$(find . -name "*.java" -not -path "./.git/*") || true
          [ -z "$java_files" ] && echo "No Java files." && exit 0
          mkdir -p build/java temp_java
          for f in $java_files; do
            rel=${f#./}; dir=$(dirname "$rel"); dest="temp_java/$rel"
            mkdir -p "$(dirname "$dest")"
            if grep -q '^package ' "$f"; then
              cp "$f" "$dest"
            elif [ "$dir" != "." ]; then
              pkg=$(echo "$dir" | tr '/' '.')
              echo "package $pkg;" > "$dest"; cat "$f" >> "$dest"
            else
              cp "$f" "$dest"
            fi
          done
          javac $(find temp_java -name "*.java") -d build/java
          for f in $(find temp_java -name "*.java"); do
            grep -q "public static void main" "$f" || continue
            pkg=$(grep -m1 '^package ' "$f" | sed 's/package \(.*\);/\1/' || true)
            cls=$(basename "$f" .java)
            fqcn=${pkg:+$pkg.}$cls
            echo "🚀 Running $fqcn"
            (cd build/java && java "$fqcn")
          done

      - name: Run Python scripts (from Python folder if available)
        run: |
          set -e
          echo "▶ Checking for Python folder..."
          if [ -d "Python" ]; then
            echo "✅ Python folder found."
            py_files=$(find Python -name "*.py")
            if [ -z "$py_files" ]; then
              echo "⚠️ No Python files found in Python folder."
              exit 0
            fi
            for f in $py_files; do
              echo "🚀 Running $f"
              python3 "$f"
            done
          else
            echo "⚠️ No Python folder found in the repository."
            echo "▶ Python files check (fallback)..."
            py_files=$(find . -name "*.py" -not -path "./.git/*") || true
            [ -z "$py_files" ] && echo "No Python files." && exit 0
            for f in $py_files; do
              grep -q "if __name__ *== *['\"]__main__['\"]" "$f" || continue
              dir=$(dirname "$f")
              if [ "$dir" = "." ]; then
                echo "🚀 Running $f"
                python3 "$f"
              else
                # run as module so package-relative imports work
                mod=$(echo "$f" | sed 's#^\./##; s#\.py$##; s#/#.#g')
                echo "🚀 Running module $mod (from repo root)"
                (cd "$(pwd)" && python3 -m "$mod")
              fi
            done
          fi
