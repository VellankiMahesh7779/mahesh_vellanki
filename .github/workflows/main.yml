name: Build and Run All C++ Programs

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile and run all independent C++ files
        run: |
          # Find all .cpp files in the repo
          CPP_FILES=$(find . -type f -name "*.cpp")

          if [ -z "$CPP_FILES" ]; then
            echo "No C++ files found. Exiting."
            exit 0
          fi

          # Loop through each .cpp file
          for file in $CPP_FILES; do
            echo "Compiling and running $file ..."
            OUTPUT="${file%.*}"   # Output binary has the same name as the file without extension
            g++ -std=c++17 "$file" -o "$OUTPUT" && ./"$OUTPUT"
          done
